<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红包雨 - 新春快乐</title>
    <link rel="stylesheet" href="./src/styles/hongbao-rain.css">
</head>

<body>
    <div class="container">
        <!-- 装饰光点 -->
        <div class="sparkle" style="top: 15%; left: 10%;"></div>
        <div class="sparkle" style="top: 25%; right: 15%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 60%; left: 8%; animation-delay: 1s;"></div>
        <div class="sparkle" style="top: 70%; right: 12%; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 40%; left: 5%; animation-delay: 0.8s;"></div>
        <div class="sparkle" style="top: 50%; right: 8%; animation-delay: 1.2s;"></div>

        <!-- 关闭按钮 -->
        <a href="hongbao-page.html" class="close-btn">&times;</a>

        <!-- 顶部标题 -->
        <div class="top-title">
            <h1>🧧 新春红包雨 🧧</h1>
            <p>点击红包领取惊喜好礼</p>
        </div>

        <!-- 红包雨容器 -->
        <div class="hongbao-rain" id="hongbaoRain"></div>

        <!-- 财神爷骑马 -->
        <div class="cute-horse">
            <img src="images/caishen_red_horse.png" alt="财神爷骑马">
        </div>

        <!-- 红联按钮 -->
        <a href="hongbao-page.html" class="hongbao-btn">
            <div class="hongbao-btn-inner">
                <span class="hongbao-btn-subtitle">✨ 参与体验 ✨</span>
                <span class="hongbao-btn-text">领取红包</span>
            </div>
        </a>

        <!-- 底部提示 -->
        <div class="bottom-hint">活动期间每日可领取一次</div>
    </div>

    <script src="./src/app/hongbao-rain.js"></script>
</body>

</html>
