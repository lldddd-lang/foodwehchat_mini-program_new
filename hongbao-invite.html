<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邀请好友 - 吃回本</title>
    <link rel="stylesheet" href="./src/styles/hongbao-invite.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="back-btn">‹</a>
            <div class="header-title">邀请好友</div>
        </header>

        <div class="content">
            <div class="invite-card">
                <div class="invite-title">邀请好友助力</div>
                <div class="invite-desc">每邀请1位位好友，获得+1次抽奖机会</div>

                <div class="qr-placeholder">
                    [ 分享二维码 ]
                </div>

                <a href="#" class="btn-primary">点击复制链接</a>
            </div>

            <div class="steps">
                <div class="step-item">
                    <div class="step-num">1</div>
                    <div class="step-text">点击上方按钮复制链接，或截屏分享二维码</div>
                </div>
                <div class="step-item">
                    <div class="step-num">2</div>
                    <div class="step-text">发送给好友，邀请好友打开链接</div>
                </div>
                <div class="step-item">
                    <div class="step-num">3</div>
                    <div class="step-text">好友成功访问后，您即可获得抽奖机会</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
